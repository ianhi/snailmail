name: Release

# Publishing a GitHub Release (on a `vX.Y.Z` tag) ships that version to PyPI via
# Trusted Publishing. A Release is tied to its tag and hatch-vcs derives the version
# from that tag, so the tag IS the version; the guard below refuses anything that
# didn't resolve to a clean release version.
on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi          # bind this environment in the PyPI trusted-publisher config
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC); no token needed
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}  # the released tag, not the default branch
          fetch-depth: 0       # hatch-vcs needs full history + tags to resolve the version
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv build
      - name: Refuse to publish a non-release (dev/local) version
        run: |
          for f in dist/*; do
            case "$f" in
              *dev*|*+*) echo "Not a clean tagged version: $f" && exit 1 ;;
            esac
          done
      - uses: pypa/gh-action-pypi-publish@release/v1
